<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Archivos - CLICKLIVE</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="archivos">

    <!-- 🔥 BOTÓN BACK LATERAL (CORREGIDO) -->
    <button class="btn-back" onclick="goBack()">
        ‹
    </button>

    <div class="container app">

        <div class="archivos-contenido">

            <!-- 🔝 TOP -->
            <div class="top-fijo">

                <div class="menu-header">
                    <div class="titulo-archivos">
                        <span>Gestión de Archivos</span>
                        <img src="img/icons/GestorDescargas.png" class="icon-header">
                    </div>
                </div>

                <!-- ACCIONES -->
                <div class="acciones-archivos">

                    <div class="accion">
                        <img src="img/icons/Descargas.png">
                        <p>Desde el dispositivo</p>
                    </div>

                    <div class="accion">
                        <img src="img/icons/BajarNube.png">
                        <p>Desde la nube</p>
                    </div>

                    <div class="accion">
                        <img src="img/icons/SubirNube.png">
                        <p>Subir a la nube</p>
                    </div>

                </div>

                <!-- INPUT FILE -->
                <input type="file" id="inputArchivo" multiple hidden>

                <!-- BUSCADOR -->
                <div class="buscador">
                    <input type="text" id="inputBuscar" placeholder="Buscar...">
                    <button type="button" id="btnBuscar">🔍</button>
                </div>

            </div>

            <!-- SCROLL -->
            <div class="zona-scroll">

                <p id="emptyState" class="empty-state">
                    Aún no hay archivos
                </p>

                <!-- CONTENEDOR DE ARCHIVOS -->
                <div id="contenedorArchivos" class="grid-archivos"></div>

            </div>

            <!-- SEPARADOR -->
            <div class="separador"></div>

            <!-- FOOTER -->
            <div class="bottom-fijo">

                <p class="texto-apps">
                    Edita tus audios, fotos y videos <br>
                    en tus aplicaciones favoritas
                </p>

                <div class="apps">

                    <div class="app-item">
                        <img src="img/icons/capcut.png">
                        <p>CapCut</p>
                    </div>

                    <div class="app-item">
                        <img src="img/icons/snapseed.png">
                        <p>Snapseed</p>
                    </div>

                    <div class="app-item">
                        <img src="img/icons/ringtone.png">
                        <p>Ringtone</p>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div id="toast"></div>

    <!-- 🔥 SCRIPT CORRECTO -->
    <script>
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = "dashboard.html"; 
            }
        }
    </script>

    <script src="js/app.js"></script>

</body>
</html>
