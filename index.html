<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICKLIVE</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="splash">

    <div class="container app">

        <!-- BLOQUE ÚNICO  -->
        <div class="splash-content">

            <p class="bienvenido">Bienvenido</p>

            <img src="img/Logo-cl.png" class="logo" onclick="irLogin()">

            <img src="img/Letrero-cl.png" class="titulo-img">

            <img src="img/icons/Frase.png" class="frase-img">

        </div>

    </div>

    <script>
        function irLogin() {
            window.location.href = "login.html";
        }

        // 🔥 AUTO ARRANQUE CONTROLADO (NO ROMPE TU FLUJO)
        window.addEventListener("load", function() {
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000); // 2 segundos splash
        });
    </script>

</body>
</html>
