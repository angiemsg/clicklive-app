<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloc de Notas</title>
<link rel="stylesheet" href="css/estilos.css">
</head>

<body class="notas">

<!-- 🔥 BOTÓN BACK GLOBAL -->
<button class="btn-back" onclick="goBack()">
    ‹
</button>

<div class="container app">

    <!-- HEADER -->
    <div class="menu-header">
        <p class="titulo-header">
            Bloc de Notas
            <img src="img/icons/BlockNotas.png" class="icon-header">
        </p>
    </div>

    <!-- BOTÓN + -->
    <div class="zona-agregar">
        <img src="img/icons/MasNotas.png" id="btnAgregar" class="btn-mas">
    </div>

    <!-- CONTENEDOR SCROLL INTERNO -->
    <div id="contenedorNotas" class="zona-notas">

        <!-- ESTADO VACÍO -->
        <p id="estadoVacio" class="estado-vacio">
            Aún no hay notas
        </p>

        <!-- AQUÍ SE INYECTAN LAS NOTAS -->
    </div>

    <!-- PAPELERA -->
    <div class="zona-botones">
        <img src="img/icons/Eliminar.png" id="papelera" class="papelera">
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Nueva Nota</h3>
        <textarea id="textoNota" placeholder="Escribe tu nota..."></textarea>
        <button id="btnGuardar">Guardar</button>
    </div>
</div>

<!-- 🔥 SCRIPT BACK -->
<script>
function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "dashboard.html";
    }
}
</script>

<script src="js/app.js"></script>

</body>
</html>
